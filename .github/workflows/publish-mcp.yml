name: Publish MCP Registry

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-mcp-registry
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download verified MCP publisher
        run: |
          curl --fail --location --output /tmp/mcp-publisher.tar.gz \
            https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz
          echo "ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac  /tmp/mcp-publisher.tar.gz" | sha256sum --check
          tar -xzf /tmp/mcp-publisher.tar.gz -C /tmp mcp-publisher

      - name: Authenticate with GitHub OIDC
        run: /tmp/mcp-publisher login github --token "${{ secrets.MCP_GITHUB_TOKEN }}"

      - name: Publish organization-owned registry record
        run: /tmp/mcp-publisher publish
