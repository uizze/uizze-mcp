name: Attest release artifact

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semantic release tag to reproduce and attest
        required: true
        default: v1.1.9
        type: string

permissions:
  contents: read

concurrency:
  group: release-attestation-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  attest:
    name: Reproduce and attest ${{ inputs.tag }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Check out all release history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Reproduce the published artifact
        id: artifact
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must use the exact vMAJOR.MINOR.PATCH form." >&2
            exit 1
          fi

          git rev-parse --verify "refs/tags/${TAG}^{commit}" >/dev/null

          version=$(git show "${TAG}:server.json" | jq -er '.version')
          if [[ "v${version}" != "$TAG" ]]; then
            echo "server.json version ${version} does not match ${TAG}." >&2
            exit 1
          fi

          artifact="uizze-mcp-${TAG}.tar.gz"
          git archive --format=tar --prefix="uizze-mcp-${TAG}/" "$TAG" | gzip -n > "$artifact"

          digest=$(sha256sum "$artifact" | cut -d ' ' -f 1)
          release=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}")
          published_digest=$(jq -er --arg name "$artifact" '.assets[] | select(.name == $name) | .digest' <<< "$release")

          if [[ "$published_digest" != "sha256:${digest}" ]]; then
            echo "Rebuilt digest sha256:${digest} does not match published ${published_digest}." >&2
            exit 1
          fi

          commit=$(git rev-parse "${TAG}^{commit}")
          tree=$(git rev-parse "${TAG}^{tree}")
          {
            echo "artifact=$artifact"
            echo "digest=$digest"
            echo "commit=$commit"
            echo "tree=$tree"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Reproducible release verified"
            echo
            echo "- Tag: \`${TAG}\`"
            echo "- Commit: \`${commit}\`"
            echo "- Tree: \`${tree}\`"
            echo "- Artifact: \`${artifact}\`"
            echo "- SHA-256: \`${digest}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Register keyless build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.artifact.outputs.artifact }}
